services:
  indico:
    image: ghcr.io/indico/indico:latest
    container_name: indico
    command: /opt/indico/run_indico.sh
    ports:
      - "8000:59999"
    volumes:
      - indico-archive:/opt/indico/archive
      - indico-custom:/opt/indico/custom
      - indico-static:/opt/indico/static-shared
      - indico-log:/opt/indico/log
      - indico-cache:/opt/indico/cache
      - type: bind
        source: ./data/indico.conf
        target: /opt/indico/etc/indico.conf
        read_only: true
      - type: bind
        source: ./data/logging.yaml
        target: /opt/indico/etc/logging.yaml
        read_only: true
    environment:
      PGHOST: postgres
      PGUSER: indico
      PGPASSWORD: indico
      PGDATABASE: indico
      INDICO_CONFIG: /opt/indico/etc/indico.conf
      INDICO_LOGGING_CONFIG: /opt/indico/etc/logging.yaml
      XDG_CACHE_HOME: /opt/indico/tmp/.cache
      MPLCONFIGDIR: /opt/indico/tmp/matplotlib
    depends_on:
      - postgres
      - redis
      - mailpit
      - indico-celery
    tmpfs:
      - /opt/indico/tmp:mode=0777
      - /var/cache/fontconfig:uid=999,gid=999,mode=0775

  indico-celery:
    image: ghcr.io/indico/indico:latest
    container_name: indico-celery
    command: /opt/indico/run_celery.sh
    volumes:
      - indico-archive:/opt/indico/archive
      - indico-custom:/opt/indico/custom
      - indico-log:/opt/indico/log
      - indico-cache:/opt/indico/cache
      - type: bind
        source: ./data/indico.conf
        target: /opt/indico/etc/indico.conf
        read_only: true
      - type: bind
        source: ./data/logging.yaml
        target: /opt/indico/etc/logging.yaml
        read_only: true
    environment:
      PGHOST: postgres
      PGUSER: indico
      PGPASSWORD: indico
      PGDATABASE: indico
      INDICO_CONFIG: /opt/indico/etc/indico.conf
      INDICO_LOGGING_CONFIG: /opt/indico/etc/logging.yaml
      XDG_CACHE_HOME: /opt/indico/tmp/.cache
      MPLCONFIGDIR: /opt/indico/tmp/matplotlib
    depends_on:
      - postgres
      - redis
      - mailpit
    tmpfs:
      - /opt/indico/tmp:mode=0777
      - /var/cache/fontconfig:uid=999,gid=999,mode=0775

  indico-celery-beat:
    image: ghcr.io/indico/indico:latest
    container_name: indico-celery-beat
    command: /opt/indico/run_celery.sh beat
    volumes:
      - indico-archive:/opt/indico/archive
      - indico-custom:/opt/indico/custom
      - indico-log:/opt/indico/log
      - indico-cache:/opt/indico/cache
      - type: bind
        source: ./data/indico.conf
        target: /opt/indico/etc/indico.conf
        read_only: true
      - type: bind
        source: ./data/logging.yaml
        target: /opt/indico/etc/logging.yaml
        read_only: true
    environment:
      PGHOST: postgres
      PGUSER: indico
      PGPASSWORD: indico
      PGDATABASE: indico
      INDICO_CONFIG: /opt/indico/etc/indico.conf
      INDICO_LOGGING_CONFIG: /opt/indico/etc/logging.yaml
      XDG_CACHE_HOME: /opt/indico/tmp/.cache
      MPLCONFIGDIR: /opt/indico/tmp/matplotlib
    depends_on:
      - postgres
      - redis
      - mailpit
    tmpfs:
      - /opt/indico/tmp:mode=0777
      - /var/cache/fontconfig:uid=999,gid=999,mode=0775

  postgres:
    image: postgres:15
    container_name: indico-postgres
    environment:
      POSTGRES_USER: indico
      POSTGRES_PASSWORD: indico
      POSTGRES_DB: indico
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: indico-redis
    volumes:
      - redis-data:/data

  mailpit:
    image: axllent/mailpit:latest
    container_name: indico-mailpit
    ports:
      - "8025:8025"
      - "1025:1025"

volumes:
  postgres-data:
  redis-data:
  indico-archive:
  indico-custom:
  indico-static:
  indico-log:
  indico-cache:
