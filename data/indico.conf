# Indico configuration
#
# Este archivo sirve tanto para LOCAL como para PRODUCCION.
# Todo se controla por variables de entorno; los valores por defecto
# reproducen el entorno local (mailpit, http://localhost:8000, etc.),
# de modo que sin variables el comportamiento local no cambia.
#
# NOTA: Indico ejecuta este archivo con espacios de nombres global/local
# separados, por lo que NO se pueden definir funciones auxiliares que usen
# 'os' (no lo verian al ser llamadas). Por eso todo el parseo es inline.
import os

_TRUE = ('1', 'true', 'yes', 'on')

# --- Base de datos -----------------------------------------------------------
SQLALCHEMY_DATABASE_URI = (
    f'postgresql://{os.environ["PGUSER"]}:{os.environ["PGPASSWORD"]}'
    f'@{os.environ["PGHOST"]}:{os.environ.get("PGPORT", "5432")}/{os.environ["PGDATABASE"]}'
)

# --- Identidad / URL ---------------------------------------------------------
# En produccion definir INDICO_SECRET_KEY (NO usar el valor por defecto).
SECRET_KEY = os.environ.get(
    'INDICO_SECRET_KEY',
    'd693180f8a66d4feb66b2c58238eef7d49866537afd2e0d479f679280d9699a9',
)
BASE_URL = os.environ.get('INDICO_BASE_URL', 'http://localhost:8000')
USE_PROXY = os.environ.get('INDICO_USE_PROXY', 'false').strip().lower() in _TRUE

DEFAULT_TIMEZONE = os.environ.get('INDICO_DEFAULT_TIMEZONE', 'UTC')
DEFAULT_LOCALE = os.environ.get('INDICO_DEFAULT_LOCALE', 'en_GB')

# --- Redis (cache + broker celery) ------------------------------------------
REDIS_CACHE_URL = os.environ.get('INDICO_REDIS_CACHE_URL', 'redis://redis:6379/0')
CELERY_BROKER = os.environ.get('INDICO_CELERY_BROKER', 'redis://redis:6379/1')

# --- Correo ------------------------------------------------------------------
NO_REPLY_EMAIL = os.environ.get('INDICO_NO_REPLY_EMAIL', 'noreply@example.invalid')
SUPPORT_EMAIL = os.environ.get('INDICO_SUPPORT_EMAIL', 'support@example.invalid')

# Por defecto apunta a mailpit (local). En produccion definir el SMTP real.
SMTP_SERVER = (
    os.environ.get('INDICO_SMTP_HOST', 'mailpit'),
    int(os.environ.get('INDICO_SMTP_PORT', '1025')),
)
SMTP_USE_TLS = os.environ.get('INDICO_SMTP_USE_TLS', 'false').strip().lower() in _TRUE
SMTP_USE_SSL = os.environ.get('INDICO_SMTP_USE_SSL', 'false').strip().lower() in _TRUE
SMTP_LOGIN = os.environ.get('INDICO_SMTP_LOGIN') or None
SMTP_PASSWORD = os.environ.get('INDICO_SMTP_PASSWORD') or None

# --- Funcionalidades ---------------------------------------------------------
ENABLE_ROOMBOOKING = os.environ.get('INDICO_ENABLE_ROOMBOOKING', 'true').strip().lower() in _TRUE

# --- Directorios de runtime / persistencia ----------------------------------
LOG_DIR = '/opt/indico/log'
TEMP_DIR = '/opt/indico/tmp'
CACHE_DIR = '/opt/indico/cache'
CUSTOMIZATION_DIR = '/opt/indico/custom'

# --- Almacenamiento de archivos ----------------------------------------------
STORAGE_BACKENDS = {'default': 'fs:/opt/indico/archive'}
ATTACHMENT_STORAGE = 'default'

del os
