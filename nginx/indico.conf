# =============================================================================
# Reverse proxy nginx (en el HOST de la VPS) para Indico
#
# Instalar en la VPS:
#   sudo cp nginx/indico.conf /etc/nginx/sites-available/indico.conf
#   sudo ln -s /etc/nginx/sites-available/indico.conf /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# El bloque HTTPS depende de los certificados de Let's Encrypt. El flujo es:
#   1) Dejar SOLO el server :80 (sin redirect) la primera vez.
#   2) sudo certbot --nginx -d eventos.tudominio.com   (genera certs + reescribe)
#   3) certbot agrega/gestiona el bloque 443 y el redirect 80->443.
# Esta plantilla ya trae ambos bloques; ajusta el dominio y las rutas de cert.
# =============================================================================

upstream indico_app {
    server 127.0.0.1:8000;   # = INDICO_HTTP_BIND del .env (contenedor web)
}

# ---- HTTP: ACME challenge + redirect a HTTPS --------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name eventos.tudominio.com;

    # Para la validacion de Let's Encrypt (webroot)
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ---- HTTPS ------------------------------------------------------------------
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name eventos.tudominio.com;

    # Rutas generadas por certbot (ajustar el dominio):
    ssl_certificate     /etc/letsencrypt/live/eventos.tudominio.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/eventos.tudominio.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    # Indico maneja subida de materiales (PDFs, slides, etc.): subir el limite.
    client_max_body_size 1g;

    # HSTS (activar solo cuando HTTPS funcione bien)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location / {
        proxy_pass http://indico_app;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;

        proxy_http_version 1.1;
        proxy_read_timeout    300s;
        proxy_send_timeout    300s;
        proxy_connect_timeout 60s;
        proxy_buffering off;
    }
}
